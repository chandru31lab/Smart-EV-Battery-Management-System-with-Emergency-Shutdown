<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Premium EV Instrument Cluster — Real-time IoT Dashboard with MQTT" />
  <title>EV Instrument Cluster — IoT Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- MQTT.js via CDN -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════ HEADER ═══════════════════ -->
  <header id="dashboard-header">
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <polygon points="16,2 30,28 2,28" fill="none" stroke="url(#logoGrad)" stroke-width="2"/>
          <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#00f0ff"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </linearGradient></defs>
          <circle cx="16" cy="18" r="4" fill="url(#logoGrad)" opacity="0.8"/>
        </svg>
      </div>
      <h1>EV <span class="accent">CLUSTER</span></h1>
    </div>
    <div class="header-right">
      <div class="mqtt-status" id="mqtt-status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Connecting…</span>
      </div>
      <div class="header-meta">
        <span id="clock"></span>
      </div>
    </div>
  </header>

  <!-- ═══════════════════ MAIN DASHBOARD ═══════════════════ -->
  <main id="dashboard-main">

    <!-- ─── LEFT: BATTERY SECTION ─── -->
    <section class="panel battery-panel" id="battery-panel">
      <div class="panel-header">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="4" width="12" height="18" rx="2"/>
          <line x1="10" y1="1" x2="14" y2="1"/>
          <rect x="8" y="10" width="8" height="10" rx="1" fill="currentColor" opacity="0.3" id="battery-fill-icon"/>
        </svg>
        <h2>Battery</h2>
      </div>

      <!-- SOC Gauge -->
      <div class="battery-soc-container">
        <div class="battery-visual">
          <div class="battery-body">
            <div class="battery-cap"></div>
            <div class="battery-level" id="battery-level">
              <div class="battery-level-glow"></div>
            </div>
            <div class="battery-segments">
              <div class="segment"></div>
              <div class="segment"></div>
              <div class="segment"></div>
              <div class="segment"></div>
            </div>
          </div>
          <div class="battery-soc-value">
            <span class="soc-number" id="soc-value">0</span>
            <span class="soc-unit">%</span>
          </div>
        </div>
        <span class="battery-label">State of Charge</span>
      </div>

      <!-- Battery Stats -->
      <div class="battery-stats">
        <div class="stat-card" id="stat-voltage">
          <div class="stat-icon voltage-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="voltage-value">0.0</span>
            <span class="stat-unit">V</span>
          </div>
          <span class="stat-label">Voltage</span>
        </div>

        <div class="stat-card" id="stat-current">
          <div class="stat-icon current-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v20M2 12h20"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="current-value">0.0</span>
            <span class="stat-unit">A</span>
          </div>
          <span class="stat-label">Current</span>
        </div>

        <div class="stat-card" id="stat-temperature">
          <div class="stat-icon temp-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 14.76V3.5a2.5 2.5 0 10-5 0v11.26a4.5 4.5 0 105 0z"/>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="temp-value">0</span>
            <span class="stat-unit">°C</span>
          </div>
          <span class="stat-label">Temperature</span>
        </div>
      </div>
    </section>

    <!-- ─── CENTER: SPEEDOMETER & RPM (Side by Side) ─── -->
    <section class="panel gauges-panel" id="gauges-panel">
      <div class="gauges-row">
        <!-- SPEEDOMETER -->
        <div class="gauge-wrapper speed-wrapper">
          <div class="gauge-outer-ring">
            <svg class="ring-deco ring-deco-1" viewBox="0 0 300 300">
              <circle cx="150" cy="150" r="146" fill="none" stroke="url(#ringGrad1)" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.4"/>
              <defs><linearGradient id="ringGrad1" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient></defs>
            </svg>
            <svg class="ring-deco ring-deco-2" viewBox="0 0 300 300">
              <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(0,240,255,0.08)" stroke-width="1" stroke-dasharray="2 6"/>
            </svg>
          </div>
          <div class="gauge-container">
            <canvas id="speedometer-canvas" width="340" height="340"></canvas>
            <div class="speed-digital">
              <span class="gauge-label-top">SPEED</span>
              <span class="speed-value" id="speed-digital-value">0</span>
              <span class="speed-unit">m/s</span>
            </div>
          </div>
        </div>

        <!-- RPM -->
        <div class="gauge-wrapper rpm-wrapper">
          <div class="gauge-outer-ring">
            <svg class="ring-deco ring-deco-1 ring-rpm" viewBox="0 0 300 300">
              <circle cx="150" cy="150" r="146" fill="none" stroke="url(#ringGrad2)" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.4"/>
              <defs><linearGradient id="ringGrad2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#ff6b2b"/>
                <stop offset="100%" stop-color="#ffd600"/>
              </linearGradient></defs>
            </svg>
            <svg class="ring-deco ring-deco-2 ring-rpm" viewBox="0 0 300 300">
              <circle cx="150" cy="150" r="140" fill="none" stroke="rgba(255,107,43,0.08)" stroke-width="1" stroke-dasharray="2 6"/>
            </svg>
          </div>
          <div class="gauge-container">
            <canvas id="rpm-canvas" width="340" height="340"></canvas>
            <div class="rpm-digital">
              <span class="gauge-label-top">TACHOMETER</span>
              <span class="rpm-value" id="rpm-digital-value">0</span>
              <span class="rpm-unit">RPM</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Direction Indicator -->
      <div class="direction-indicator" id="direction-indicator">
        <div class="dir-btn" id="dir-backward" title="Press ↓ Arrow Key">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12l7 7 7-7"/>
          </svg>
          <span>BWD</span>
        </div>
        <div class="dir-status" id="dir-status">NEUTRAL</div>
        <div class="dir-btn" id="dir-forward" title="Press ↑ Arrow Key">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
          <span>FWD</span>
        </div>
      </div>
    </section>

    <!-- ─── RIGHT: MOTOR CONTROL ─── -->
    <section class="panel motor-panel" id="motor-panel">
      <div class="panel-header">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.2 2.2M16.2 16.2l2.2 2.2M5.6 18.4l2.2-2.2M16.2 7.8l2.2-2.2"/>
        </svg>
        <h2>Motor Control</h2>
      </div>

      <!-- PWM Control -->
      <div class="control-group">
        <div class="control-label-row">
          <span class="control-label">PWM Duty Cycle</span>
          <span class="control-value" id="pwm-display">0<small>%</small></span>
        </div>
        <div class="slider-container">
          <input type="range" id="pwm-slider" min="0" max="100" value="0" class="premium-slider pwm-slider-input" />
          <div class="slider-track-fill pwm-fill" id="pwm-fill"></div>
        </div>
        <div class="slider-ticks">
          <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
        </div>
      </div>

      <!-- Frequency Control -->
      <div class="control-group">
        <div class="control-label-row">
          <span class="control-label">Frequency</span>
          <span class="control-value" id="freq-display">1000<small>Hz</small></span>
        </div>
        <div class="slider-container">
          <input type="range" id="freq-slider" min="100" max="25000" value="1000" step="100" class="premium-slider freq-slider-input" />
          <div class="slider-track-fill freq-fill" id="freq-fill"></div>
        </div>
        <div class="slider-ticks">
          <span>100</span><span>5k</span><span>10k</span><span>15k</span><span>25k</span>
        </div>
      </div>

      <!-- Direction Control -->
      <div class="control-group">
        <div class="control-label-row">
          <span class="control-label">Direction</span>
          <span class="control-value direction-value" id="direction-display">NEUTRAL</span>
        </div>
        <div class="direction-buttons">
          <button class="dir-control-btn" id="btn-backward" title="Arrow Down ↓">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            Backward
          </button>
          <button class="dir-control-btn stop-btn" id="btn-stop" title="Spacebar">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
            Stop
          </button>
          <button class="dir-control-btn" id="btn-forward" title="Arrow Up ↑">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            Forward
          </button>
        </div>
        <p class="key-hint">Use <kbd>↑</kbd> <kbd>↓</kbd> Arrow Keys &nbsp;|&nbsp; <kbd>Space</kbd> to Stop</p>
      </div>

      <!-- MQTT Config -->
      <div class="mqtt-config">
        <div class="config-header" id="mqtt-config-toggle">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span>MQTT Settings</span>
          <svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
        <div class="config-body" id="mqtt-config-body">
          <div class="config-field">
            <label for="mqtt-host">Broker URL</label>
            <input type="text" id="mqtt-host" value="wss://jace13a6.ala.asia-southeast1.emqxsl.com:8084/mqtt" placeholder="wss://broker-url:port/mqtt" />
          </div>
          <button class="btn-connect" id="btn-reconnect">Reconnect</button>
        </div>
      </div>
    </section>

  </main>

  <script src="dashboard.js"></script>
</body>
</html>
